# The layout text of site

# ----- Commons label -----

layout:
  post: Post
  category: Branch
  tag: Tag

# The tabs of sidebar
tabs:
  # format: <filename_without_extension>: <value>
  home: git log
  categories: git branch
  tags: git tag
  archives: git reflog
  about: git blame

# the text displayed in the search bar & search results
search:
  hint: search
  cancel: Cancel
  no_results: Oops! No results found.

panel:
  lastmod: HEAD~
  trending_tags: --popular
  toc: Contents

copyright:
  license:
    template: This post is licensed under :LICENSE_NAME by the author.
    name: CC BY 4.0
    link: https://creativecommons.org/licenses/by/4.0/

  brief: Some rights reserved.
  verbose: >-
    Except where otherwise noted, the blog posts on this site are licensed
    under the Creative Commons Attribution 4.0 International (CC BY 4.0) License by the author.

meta: Using the :THEME theme for :PLATFORM.

not_found:
  statement: Sorry, we've misplaced that URL or it's pointing to something that doesn't exist.

notification:
  update_found: New content available
  update: Update

theme:
  light: Light
  dark: Dark
  system: System

# ----- Posts related labels -----

post:
  written_by: By
  posted: Posted
  updated: Updated
  words: words
  pageview_measure: views
  read_time:
    unit: min
    prompt: read
  edit: Edit this post
  relate_posts: Further Reading
  share: Share
  button:
    next: Newer
    previous: Older
    copy_code:
      succeed: Copied!
    share_link:
      title: Copy link
      succeed: Link copied successfully!

df:
  post:
    strftime: "%b %e, %Y"
    dayjs: "ll"
  archives:
    strftime: "%b"
    dayjs: "MMM"

categories:
  category_measure:
    singular: branch
    plural: branches
  post_measure:
    singular: commit
    plural: commits
